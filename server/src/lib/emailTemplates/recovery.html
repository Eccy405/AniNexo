<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background-color: #000; color: #fff; text-align: center; padding: 50px; }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #f00; display: inline-block; }
        .btn { background: #f00; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔐 Recuperación de Cuenta</h1>
        <p>Has solicitado restablecer tu contraseña en AniNexo.</p>
        <p>Utiliza el siguiente código para continuar:</p>
        <h2 style="letter-spacing: 5px; color: #f00;">{{token}}</h2>
        <p>Si no solicitaste esto, ignora este correo.</p>
        <br>
        <a href="{{resetUrl}}" class="btn">Restablecer Ahora</a>
    </div>
</body>
</html>
